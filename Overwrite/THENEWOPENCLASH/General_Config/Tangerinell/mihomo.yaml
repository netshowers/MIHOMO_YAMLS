# ==========================================================
# rules（从源文件直接提取）
# ----------------------------------------------------------
# 原始规则列表，默认注释不启用。
# 常用操作：
#   +rules: [...]   在规则列表开头插入（优先匹配）
#   rules+: [...]   在规则列表末尾追加
#   rules!: [...]   强制替换整个规则列表（丢弃原有规则）
# 参考上方示例，通常不需要取消注释整个 rules，而是用 +rules/rules+ 追加即可。
# ==========================================================
#
# rules:
# - RULE-SET,LAN,DIRECT
# - RULE-SET,SteamCN,DIRECT
# - RULE-SET,Steam,Steam
# - RULE-SET,Epic,Epic
# - RULE-SET,Telegram,Telegram
# - RULE-SET,Spotify,Spotify
# - RULE-SET,Instagram,Instagram
# - RULE-SET,GitHub,GitHub
# - RULE-SET,PikPak,PikPak
# - RULE-SET,Discord,Discord
# - RULE-SET,TikTok,TikTok
# - RULE-SET,Pornhub,Pornhub
# - RULE-SET,Gemini,Gemini
# - RULE-SET,OpenAI,OpenAI
# - RULE-SET,YouTube,YouTube
# - RULE-SET,Netflix,Netflix
# - RULE-SET,GlobalMedia,GlobalMedia
# - RULE-SET,Google,Google
# - RULE-SET,Apple,Apple
# - RULE-SET,Microsoft,Microsoft
# - RULE-SET,Cloudflare,Cloudflare
# - RULE-SET,ChinaDirectSite,DIRECT
# - RULE-SET,ChinaDirectIP,DIRECT
# - RULE-SET,ChinaDirectAdd,DIRECT
# - MATCH,🌐其他

